<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mapa de Eventos</title>

<link rel="stylesheet" href="../css/style.css">


<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">

</head>

<body>

<header class="header">
<div class="logo">Mapa</div>
</header>

<section class="map-container">
<div class="map-search-wrapper">
  <input id="map-search" class="map-search" placeholder="Buscar evento, equipe ou cidade">
  <button id="map-search-btn" class="map-search-btn">BUSCAR</button>
</div>

<div id="map"></div>

<div class="map-event-card" id="mapEventCard">
  Evento selecionado
</div>
</section>

<div id="app-footer"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script type="module" src="../js/map.js"></script>
<script src="../js/footer.js"></script>

</body>
</html>
