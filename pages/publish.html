<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adicionar Evento</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>


<div id="app-header"></div>

<section class="publish-container">

  <div class="publish-card">

    <div class="publish-group">
      <label>Nome da equipe</label>
      <input id="event-team" type="text" placeholder="Ex: Equipe Ventos do Norte">
    </div>

    <div class="publish-group">
      <label>Nome do evento</label>
      <input id="event-title" type="text" placeholder="Ex: Festival das Bandeiras">
    </div>

    <div class="publish-group">
      <label>Cidade</label>
      <input id="event-city" type="text" placeholder="Ex: Guarulhos">
    </div>

    <div class="publish-group">
      <label>Local</label>
      <input id="event-location" type="text" placeholder="Ex: Parque, Campo, Praça">
    </div>

    <div class="publish-group">
      <label>Data do evento</label>
      <input id="event-date" type="date">
    </div>

    <div class="publish-group">
      <label>Instagram do evento</label>
      <input id="event-instagram" type="text" placeholder="Link do Instagram">
    </div>

    <div class="publish-group">
      <label>Arte do evento</label>
      <input id="event-image" type="file" accept="image/*">
      <small class="publish-hint" style="display:block;font-size:10px;text-align:right;opacity:0.7;margin-top:4px;">Stories: 1080×1920 px • Destaque: 1200×1200 px</small>
    </div>

    <button id="publish-event" class="publish-button">Publicar evento</button>

  </div>

</section>


<script type="module">
import { loadHeader } from "../js/header.js";
loadHeader("Adicionar Evento");
</script>

<div id="app-footer"></div>

<script type="module">
import { loadFooter } from "../js/footer.js";
loadFooter("publish");
</script>

<script type="module" src="../js/publish.js"></script>

</body>
</html>
