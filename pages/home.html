<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebPipa</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0b0b0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="WebPipa">
</head>

<body>

  <div id="app-header"></div>

  <!-- ANÚNCIO -->
  <section class="ads">
    <div class="ad-banner">Espaço Publicitário</div>
  </section>

  <!-- STORIES (EVENTOS PRÓXIMOS) -->
  <!-- SECTION HEADER: EVENTOS PRÓXIMOS -->
  <div class="section-header">
    <span class="section-title">Eventos Próximos</span>
    <span class="section-arrow">››</span>
  </div>
  <section class="stories">
    <div class="stories-container"></div>
  </section>

  <!-- EVENTOS EM DESTAQUE -->
  <!-- SECTION HEADER: EM DESTAQUE -->
  <div class="section-header">
    <span class="section-title">Eventos em destaque</span>
  </div>
  <section class="highlight" style="margin-top:12px;">
    <div class="highlight-card"></div>
  </section>


  <script>
    const navItems = document.querySelectorAll('.nav-item');

    navItems.forEach(item => {
      item.addEventListener('click', () => {
        const page = item.dataset.page;

        if(page === 'events') window.location.href = '/pages/home.html';
        if(page === 'map') window.location.href = '/pages/map.html';
        if(page === 'publish') window.location.href = '/pages/publish.html';
        if(page === 'ranking') window.location.href = '/pages/ranking.html';
        if(page === 'profile') {
          const userEmail = localStorage.getItem("user_email");

          const admins = [
            "duckcreativesolutions@gmail.com"
          ];

          if (admins.includes(userEmail)) {
            window.location.href = '/pages/admin.html';
          } else {
            window.location.href = '/pages/profile.html';
          }
        }
      });
    });
  </script>
<script type="module">
import { loadHeader } from "../js/header.js";
import { loadFooter } from "../js/footer.js";

loadHeader("Eventos");
loadFooter("events");
</script>
  <script type="module" src="../js/home.js"></script>

</body>
</html>
